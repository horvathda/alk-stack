<h2>Feladatok</h2>

<div *ngIf="(vm$ | async) as vm">
  <div *ngIf="vm.loading">Töltés…</div>
  <div *ngIf="vm.error" style="color:red;">{{ vm.error }}</div>

  <ul *ngIf="vm.items.length > 0">
    <li *ngFor="let t of vm.items; trackBy: trackById" style="margin-bottom: 6px; opacity: {{ isDeleting(vm, t) ? '0.6' : '1' }};">
      <label style="cursor:pointer;">
        <input
          type="checkbox"
          [checked]="t.completed"
          (change)="toggle(t)"
          [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)" />
        <span [style.textDecoration]="t.completed ? 'line-through' : 'none'">
          {{ t.title }}
        </span>
      </label>

      <small *ngIf="t.description"> — {{ t.description }}</small>

      <small *ngIf="isSaving(vm, t)" style="margin-left: 8px; color: #666;">
        mentés...
      </small>

      <small *ngIf="isDeleting(vm, t)" style="margin-left: 8px; color: #666;">
        törlés...
      </small>

      <button
        style="margin-left: 8px;"
        (click)="remove(t)"
        [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)">
        törlés
      </button>
    </li>
  </ul>

  <div *ngIf="!vm.loading && vm.items.length === 0">
    Nincs feladat.
  </div>

  <div style="margin-top: 12px;">
    <button (click)="prev(vm)" [disabled]="vm.loading || vm.page <= 1">Prev</button>
    <span style="margin: 0 8px;">Oldal {{ vm.page }}</span>
    <button (click)="next(vm)" [disabled]="vm.loading || (vm.page * vm.pageSize >= vm.total)">Next</button>
    <span style="margin-left: 8px;">Összes: {{ vm.total }}</span>
  </div>
</div>
