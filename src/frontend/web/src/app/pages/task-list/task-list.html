<section class="task-page" *ngIf="(vm$ | async) as vm">
  <div class="task-shell">
    <div class="task-header">
      <div>
        <h2>Feladatok</h2>
        <p class="task-subtitle">Áttekinthető, gyorsan kezelhető lista</p>
      </div>

      <div class="task-stats" *ngIf="!vm.loading">
        <div class="stat-badge">
          <span class="stat-label">Függőben</span>
          <strong>{{ getPendingCount(vm) }}</strong>
        </div>
        <div class="stat-badge done">
          <span class="stat-label">Kész</span>
          <strong>{{ getCompletedCount(vm) }}</strong>
        </div>
        <div class="stat-badge total">
          <span class="stat-label">Összes</span>
          <strong>{{ vm.items.length }}</strong>
        </div>
      </div>
    </div>

    <div class="task-card">
      <div *ngIf="vm.loading" class="info-banner">Töltés…</div>
      <div *ngIf="vm.error" class="info-banner error">{{ vm.error }}</div>

      <ul *ngIf="vm.items.length > 0" class="task-list">
        <li *ngFor="let t of vm.items; trackBy: trackById" class="task-item" [class.is-completed]="t.completed"
          [class.is-deleting]="isDeleting(vm, t)">
          <label class="task-main">
            <input class="task-checkbox" type="checkbox" [checked]="t.completed" (change)="toggle(t)"
              [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)" />

            <div class="task-content">
              <span class="task-title">{{ t.title }}</span>
              <small *ngIf="t.description" class="task-description">
                {{ t.description }}
              </small>
            </div>
          </label>

          <div class="task-meta">

            <button class="delete-btn" (click)="remove(t)"
              [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)">
              Törlés
            </button>
          </div>
        </li>
      </ul>

      <div *ngIf="!vm.loading && vm.items.length === 0" class="empty-state">
        <div class="empty-icon">✓</div>
        <div>
          <strong>Nincs feladat</strong>
          <p>Minden kész, vagy még nem hoztál létre egyet sem.</p>
        </div>
      </div>
    </div>
  </div>
</section>
