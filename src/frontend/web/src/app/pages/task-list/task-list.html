<h2>Feladatok</h2>

<div *ngIf="(vm$ | async) as vm">
  <div *ngIf="vm.loading">Töltés…</div>
  <div *ngIf="vm.error" style="color:red;">{{ vm.error }}</div>

  <div *ngIf="!vm.loading" style="margin: 8px 0 14px 0;">
    <strong>Függőben:</strong> {{ getPendingCount(vm) }}
    <span style="margin: 0 10px;">•</span>
    <strong>Kész:</strong> {{ getCompletedCount(vm) }}
    <span style="margin: 0 10px;">•</span>
    <strong>Összes:</strong> {{ vm.items.length }}
  </div>

  <ul *ngIf="vm.items.length > 0">
    <li *ngFor="let t of vm.items; trackBy: trackById"
      style="margin-bottom: 6px; opacity: {{ isDeleting(vm, t) ? '0.6' : '1' }};">
      <label style="cursor:pointer;">
        <input type="checkbox" [checked]="t.completed" (change)="toggle(t)"
          [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)" />
        <span [style.textDecoration]="t.completed ? 'line-through' : 'none'">
          {{ t.title }}
        </span>
      </label>

      <small *ngIf="t.description"> — {{ t.description }}</small>

      <button style="margin-left: 8px;" (click)="remove(t)"
        [disabled]="vm.loading || isSaving(vm, t) || isDeleting(vm, t)">
        törlés
      </button>
    </li>
  </ul>

  <div *ngIf="!vm.loading && vm.items.length === 0">
    Nincs feladat.
  </div>
</div>
