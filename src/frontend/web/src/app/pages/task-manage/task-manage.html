<h2>Hozzáadás / módosítás</h2>

<div *ngIf="(vm$ | async) as vm">
  <div *ngIf="vm.error" style="color:red;">{{ vm.error }}</div>

  <div style="display:flex; gap:20px; align-items:flex-start;">
    <section style="min-width:260px;">
      <h3>Feladat kiválasztása</h3>

      <ul>
        <li *ngFor="let t of vm.items">
          <a href="#" (click)="$event.preventDefault(); selectTask(t)">
            {{ t.title }}
          </a>
        </li>
      </ul>
    </section>

    <section style="flex:1;">
      <h3>{{ selectedId ? 'Módosítás' : 'Új feladat' }}</h3>

      <div style="display:flex; flex-direction:column; gap:8px; max-width:520px;">
        <input [(ngModel)]="title" placeholder="Title" [disabled]="vm.loading" />
        <input [(ngModel)]="description" placeholder="Description (optional)" [disabled]="vm.loading" />

        <label *ngIf="selectedId">
          <input type="checkbox" [(ngModel)]="completed" [disabled]="vm.loading" />
          Completed
        </label>

        <div style="display:flex; gap:8px;">
          <button (click)="save()" [disabled]="vm.loading">
            {{ selectedId ? 'Mentés' : 'Hozzáadás' }}
          </button>
          <button (click)="resetForm()" [disabled]="vm.loading">Új (reset)</button>
        </div>
      </div>
    </section>
  </div>
</div>
