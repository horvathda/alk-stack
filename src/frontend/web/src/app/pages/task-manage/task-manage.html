<h2>Hozzáadás / módosítás</h2>

<div *ngIf="error" style="color:red;">{{ error }}</div>

<div style="display:flex; gap:20px; align-items:flex-start;">

  <section style="min-width:260px;">
    <h3>Feladat kiválasztása</h3>
    <button (click)="refreshList()">Frissítés</button>
    <ul>
      <li *ngFor="let t of tasks">
        <a href="#" (click)="$event.preventDefault(); selectTask(t.id!)">
          {{ t.title }}
        </a>
      </li>
    </ul>
  </section>

  <section style="flex:1;">
    <h3>{{ selectedId ? 'Módosítás' : 'Új feladat' }}</h3>

    <div style="display:flex; flex-direction:column; gap:8px; max-width:520px;">
      <input [(ngModel)]="title" placeholder="Title" />
      <input [(ngModel)]="description" placeholder="Description (optional)" />

      <label *ngIf="selectedId">
        <input type="checkbox" [(ngModel)]="completed" />
        Completed
      </label>

      <div style="display:flex; gap:8px;">
        <button (click)="save()" [disabled]="loading">{{ selectedId ? 'Mentés' : 'Hozzáadás' }}</button>
        <button (click)="resetForm()">Új (reset)</button>
      </div>
    </div>
  </section>

</div>
