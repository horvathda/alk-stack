services:
  mongo:
    image: mongo:8
    container_name: alk-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./src/backend/WebApi
      dockerfile: Dockerfile.dev
    container_name: alk-backend
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MONGO_URL: mongodb://root:example@mongo:27017/tasks?authSource=admin
    depends_on:
      - mongo
    volumes:
      - ./src/backend/WebApi:/src

  frontend:
    build:
      context: ./src/frontend/web
      dockerfile: Dockerfile.dev
    container_name: alk-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      # Windows/WSL alatt sokszor kell a polling a file watchhoz:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./src/frontend/web:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mongo_data:
  frontend_node_modules:
