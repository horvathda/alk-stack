apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alk-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/horvathda/alk-stack
    targetRevision: master
    path: k8s           
  destination:
    server: https://kubernetes.default.svc
    namespace: alk-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true